<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>أسئلة مفتوحة</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">منصّة إثراء الثقافة السعودية</div>
    <nav class="actions">
      <a class="btn" href="../home/project-list.html">الرئيسية</a>
      <button class="btn" onclick="history.back()">رجوع</button>
      <a class="btn" href="../auth/login.html" onclick="localStorage.removeItem('currentUser')">تسجيل خروج</a>
    </nav>
  </header>

  <main class="container">
    <h1 id="page-title">أسئلة مفتوحة</h1>
    <div class="meta">
      <progress id="progress" value="0" max="100"></progress>
      <span id="counter"></span>
      <small id="meta"></small>
    </div>
    <section id="question-container" class="q-area"></section>

    <footer class="nav-actions">
      <button id="btn-prev" class="btn">السابق</button>
      <button id="btn-next" class="btn">التالي</button>
      <button id="btn-finish" class="btn btn-primary" style="display:none">إنهاء الجلسة</button>
    </footer>
  </main>

  <script>
    const u = new URL(location.href);
    if (!u.searchParams.get('type')) { u.searchParams.set('type','OPEN_ENDED'); location.replace(u); }
  </script>
  <script src="../assets/js/dataSources.js"></script>
  <script src="../assets/js/annotate.js"></script>
</body>
</html>
