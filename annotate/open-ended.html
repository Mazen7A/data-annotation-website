<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>أسئلة مفتوحة</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">منصّة إثراء الثقافة السعودية</div>
    <nav class="actions">
      <a class="btn" href="../home/project-list.html">الرئيسية</a>
      <button class="btn" onclick="history.back()">رجوع</button>
      <a class="btn" href="../auth/login.html" onclick="localStorage.removeItem('currentUser')">تسجيل خروج</a>
    </nav>
  </header>

  <main class="container" style="max-width:900px;margin:auto">
    <h1>أسئلة مفتوحة</h1>

    <div class="meta" style="display:flex;gap:10px;align-items:center">
      <progress id="progress" value="0" max="100" style="width:240px"></progress>
      <small id="meta"></small>
    </div>

    <!-- صندوق السؤال -->
    <section class="question card" style="margin-top:12px">
      <h3 id="q-title">—</h3>
      <p id="q-body" class="muted"></p>
    </section>

     <form id="oeForm" style="margin-top:12px"></form>

    <!-- أزرار التنقل (IDs مطابقة لما يقرأه annotate.js) -->
    <footer class="nav-actions" style="display:flex;gap:8px;justify-content:center;margin-top:16px">
      <button class="btn" id="btnPrev"  data-nav="prev">السابق</button>
      <button class="btn" id="btnNext"  data-nav="next">التالي</button>
      <button class="btn btn-primary" id="btnDone" data-nav="finish" style="display:none">إنهاء الجلسة</button>
    </footer>
  </main>

   <script>
    const u = new URL(location.href);
    if (!u.searchParams.get('type')) {
      u.searchParams.set('type','OPEN_ENDED');
      location.replace(u);
    }
  </script>

   <script src="../assets/js/dataSources.js"></script>
  <script src="../assets/js/annotate.js"></script>
</body>
</html>
