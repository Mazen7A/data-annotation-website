<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>اختيار من متعدد</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">منصّة إثراء الثقافة السعودية</div>
    <nav class="actions">
      <a class="btn" href="../home/project-list.html">الرئيسية</a>
      <button class="btn" onclick="history.back()">رجوع</button>
      <a class="btn" href="../auth/login.html" onclick="localStorage.removeItem('currentUser')">تسجيل خروج</a>
    </nav>
  </header>

  <main class="container">
    <h1 id="page-title">أسئلة اختيار من متعدد</h1>

    <div class="meta">
      <progress id="progress" value="0" max="100"></progress>
      <span id="counter"></span>
      <small id="meta"></small>
    </div>

    <section id="question-container" class="q-area" style="max-width:900px;margin:auto">
      <article class="question card">
        <h3 id="q-title">—</h3>
        <p id="q-body" class="muted"></p>
      </article>

      <form id="mcqForm" style="margin-top:12px"></form>
    </section>

    <footer class="nav-actions" style="display:flex;gap:8px;justify-content:center;margin-top:16px">
      <button id="btn-prev" class="btn" data-nav="prev">السابق</button>
      <button id="btn-next" class="btn" data-nav="next">التالي</button>
      <button id="btn-finish" class="btn btn-primary" data-nav="finish" style="display:none">إنهاء الجلسة</button>
    </footer>
  </main>

  <script>
    const u = new URL(location.href);
    if (!u.searchParams.get('type')) { u.searchParams.set('type','MCQ'); location.replace(u); }
  </script>

  <script src="../assets/js/dataSources.js"></script>
  <script src="../assets/js/annotate.js"></script>
</body>
</html>
