<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>أسئلة اختيار من متعدد</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
 <header class="site-header">
  <div class="header-left">
    <img src="../assets/images/thaqafatna-circle.svg" alt="شعار ثقافتنا" class="logo">
    <div class="brand">منصّة إثراء الثقافة السعودية</div>
  </div>
  <nav class="actions">
    <a class="btn" href="../home/project-list.html">الرئيسية</a>
    <button class="btn" onclick="history.back()">رجوع</button>
    <a class="btn btn-logout" href="../auth/login.html" onclick="localStorage.removeItem('currentUser')">تسجيل خروج</a>
  </nav>
</header>


  <main class="container" style="max-width:900px;margin:auto">
    <h1>أسئلة اختيار من متعدد</h1>

    <div class="meta" style="display:flex;gap:10px;align-items:center">
      <progress id="progress" value="0" max="100" style="width:240px"></progress>
      <small id="meta"></small>
    </div>

    <!-- هذه العناصر مطلوبة للعرض -->
    <section class="question card" style="margin-top:12px">
      <h3 id="q-title">—</h3>
      <p id="q-body" class="muted"></p>
    </section>

    <!-- هنا تتولّد الاختيارات -->
    <form id="mcqForm" style="margin-top:12px"></form>

    <footer class="nav-actions" style="display:flex;gap:8px;justify-content:center;margin-top:16px">
      <!-- استخدم data-nav أو IDs التالية -->
      <button class="btn" data-nav="prev"  id="btnPrev">السابق</button>
      <button class="btn" data-nav="next"  id="btnNext">التالي</button>
      <button class="btn btn-primary" data-nav="finish" id="btnDone" style="display:none">إنهاء الجلسة</button>
    </footer>
  </main>

  <!-- ضامن النوع -->
  <script>
    const u = new URL(location.href);
    if (!u.searchParams.get('type')) { u.searchParams.set('type', 'MCQ'); location.replace(u); }
  </script>

<script src="../assets/js/dataSources.js"></script>
<script src="../assets/js/annotate.js"></script>

</body>
</html>
