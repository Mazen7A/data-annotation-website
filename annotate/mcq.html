<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>أسئلة اختيار من متعدد</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .q-feedback{margin-top:12px;padding:10px 12px;border-radius:12px;display:none;align-items:center;gap:10px;font-weight:600;background:#f9fafb;border:1px solid #e5e7eb}
    .q-feedback.ok{border-color:#bbf7d0;background:#ecfdf5;color:#065f46;display:flex}
    .q-feedback.bad{border-color:#fecaca;background:#fef2f2;color:#7f1d1d;display:flex}
    .q-emoji{font-size:22px;line-height:1}
    button:disabled{opacity:.6;cursor:not-allowed}
  </style>
</head>
<body>
<header class="site-header">
  <div class="header-left">
    <img src="../assets/images/thaqafatna-circle.svg" alt="شعار ثقافتنا" class="logo">
    <div class="brand">منصّة إثراء الثقافة السعودية</div>
  </div>
  <nav class="actions">
    <a class="btn" href="../home/project-list.html">الرئيسية</a>
    <button class="btn" onclick="history.length>1?history.back():location.href='../home/project-list.html'">رجوع</button>
    <a class="btn btn-logout" href="../auth/login.html" onclick="localStorage.removeItem('currentUser')">تسجيل خروج</a>
  </nav>
</header>

<main class="container" style="max-width:900px;margin:auto">
  <h1>أسئلة اختيار من متعدد</h1>

  <div class="meta" style="display:flex;gap:10px;align-items:center">
    <progress id="progress" value="0" max="100" style="width:240px"></progress>
    <small id="meta"></small>
  </div>

  <section class="question card" style="margin-top:12px">
    <h3 id="q-title">—</h3>
    <p id="q-body" class="muted"></p>
  </section>

  <form id="mcqForm" style="margin-top:12px"></form>

  <!-- فيدباك السؤال الحالي -->
  <div id="per-question-feedback" class="q-feedback" aria-live="polite">
    <span id="q-emoji" class="q-emoji" role="img" aria-label="feedback">✅</span>
    <div class="q-counts">
      <strong><span id="q-correct-count">0</span></strong> صحيحة •
      <strong><span id="q-wrong-count">0</span></strong> خاطئة
    </div>
  </div>

  <footer class="nav-actions" style="display:flex;gap:8px;justify-content:center;margin-top:16px">
    <button class="btn" id="btnPrev" type="button">السابق</button>
    <button class="btn" id="btnNext" type="button" disabled>التالي</button>
    <button class="btn btn-primary" id="btnDone" style="display:none" type="button">إنهاء الجلسة</button>
  </footer>
</main>

<script>
  const u=new URL(location.href);
  if(!u.searchParams.get('type')){u.searchParams.set('type','MCQ');location.replace(u);}
</script>

<!-- زد رقم الإصدار لتجاوز الكاش -->
<script src="../assets/js/dataSources.js?v=20251103"></script>
<script src="../assets/js/annotate.js?v=20251103"></script>
</body>
</html>
