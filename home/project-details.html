<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title id="page-title">تفاصيل المشروع</title>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <style>
    /* تحكم بسيط لبطاقات الفئات (بدون زر فتح البطاقة) */
    .qtype-card .card-actions{display:none}
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <img src="../assets/images/thaqafatna-circle.svg" alt="ثقافتنا" class="logo">
  </div>
  <div class="brand">منصة إثراء الثقافة السعودية</div>
  <nav class="actions">
    <button class="btn-back" onclick="history.back()">رجوع</button>
    <button onclick="logout()">تسجيل خروج</button>
  </nav>
</header>

<div class="page">
  <div class="container">
    <h1 id="project-name" class="page-title">تفاصيل المشروع</h1>

    <div id="stats-bar"></div>

    <!-- ملخص بسيط: الفكرة وعدد الأسئلة فقط -->
    <div class="card">
      <h2 class="section-title">ملخص المشروع</h2>
      <p id="project-summary" class="small-gray">جاري التحميل...</p>
      <div id="pd-meta" class="chips"></div>
    </div>

    <h2 class="section-title" style="margin-top:18px">ابدأ التقييم</h2>
    <p class="small-gray" style="margin-top:-6px;">اختر نوع الأسئلة ثم اضغط على القسم لبدء الجلسة.</p>

    <div class="qtype-picker" style="margin-bottom:12px;">
      <label for="qTypeSelect"><b>نوع الأسئلة:</b></label>
      <select id="qTypeSelect">
        <option value="MCQ">اختيار من متعدد (MCQ)</option>
        <option value="TRUE_FALSE">صح / خطأ</option>
        <option value="LIST">قائمة (List)</option>
        <option value="OPEN_ENDED">أسئلة مفتوحة</option>
      </select>
    </div>

    <div id="qtype-wrap" class="qtype-grid"></div>

    <div id="manager-panel" style="display:none">
      <h2 class="section-title" style="margin-top:18px">إحصائيات المشروع</h2>
      <div class="card"><canvas id="categoryChart"></canvas></div>
      <div class="card" style="margin-top: 10px;">
        <h3 class="section-title">بيانات إضافية</h3>
        <p id="manager-stats" class="small-gray">—</p>
      </div>
    </div>
  </div>
</div>

<script>
  function getParam(name){ const u=new URL(location.href); return u.searchParams.get(name)||''; }
  const rawId = getParam('id') || 'SC_GENERAL';
  const projectId = rawId.toUpperCase();
  const role = (getParam('role') || 'user').toLowerCase();

  const TYPE_PAGE = {
    MCQ:        '../annotate/mcq.html',
    TRUE_FALSE: '../annotate/true-false.html',
    LIST:       '../annotate/list.html',
    OPEN_ENDED: '../annotate/open-ended.html'
  };

  function normalizeProject(p){
    return {
      id: p.id,
      name: p.name,
      managerDescription: p.managerDescription,
      userDescription: p.userDescription,
      categories: p.categories || [],
      questionTypes: p.questionTypes || [],
      stats: p.stats || {},
      annotatorsCount: p.annotatorsCount || 0
    };
  }

  function renderProject(){
    const projects = window.PROJECTS || [];
    const raw = projects.find(x=>x.id===projectId) || projects[0] || {};
    const project = normalizeProject(raw);

    document.getElementById('project-name').textContent = project.name || projectId;
    document.getElementById('project-summary').textContent = (role==='manager'?project.managerDescription:project.userDescription) || '';
    const total = project.stats?.totalTasks || (project.categories ? (project.categories.length * 10) : 0) || 0;
    const types = (project.questionTypes || []).join(', ') || '—';
    document.getElementById('pd-meta').innerHTML = `<span class="chip">إجمالي الأسئلة: ${total}</span> <span class="chip">الأنواع المتاحة: ${types}</span>`;

    // عرض بطاقات الفئات بدون زر "فتح البطاقة" — النقر على البطاقة ينقل لصفحة التقييم بناءً على select
    const wrap = document.getElementById('qtype-wrap');
    wrap.innerHTML='';
    (project.categories || []).forEach(cat=>{
      const card = document.createElement('div');
      card.className='qtype-card';
      const perCat = Math.round((project.stats?.totalTasks || (project.categories.length*10 || 10)) / Math.max(1, project.categories.length));
      card.innerHTML = `<h3>${cat.label || cat.id}</h3><div class="muted">عدد الأسئلة:</div><div class="count-badge">${perCat}</div>`;
      card.addEventListener('click', ()=>{
        const picked = document.getElementById('qTypeSelect').value || 'MCQ';
        const page = TYPE_PAGE[picked] || TYPE_PAGE.MCQ;
        const url = new URL(page, location.href);
        url.searchParams.set('id', projectId);
        url.searchParams.set('role', role);
        url.searchParams.set('type', picked);
        url.searchParams.set('cat', cat.id || cat);
        location.href = url.toString();
      });
      wrap.appendChild(card);
    });

    if(role==='manager'){
      const panel = document.getElementById('manager-panel');
      if(panel) panel.style.display='block';
      document.getElementById('manager-stats').textContent = `عدد المقيمين (تقريبي): ${project.annotatorsCount || 0}`;
    }
  }

  document.addEventListener('DOMContentLoaded', function(){
    if(!window.PROJECTS){
      const s=document.createElement('script'); s.src='../assets/js/mockData.js';
      s.onload=renderProject; document.head.appendChild(s);
    } else renderProject();
  });

  function logout(){ localStorage.removeItem('currentUser'); window.location.href="../auth/login.html"; }
</script>
</body>
</html>
