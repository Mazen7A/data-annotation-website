<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>إحصائياتي</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background:#f7f8fa; padding-top:90px; font-family:"Cairo",sans-serif; }
    .app-header{display:flex;align-items:center;justify-content:space-between;background:#fff;padding:0 20px;border-bottom:1px solid #eee;height:72px;position:fixed;top:0;left:0;right:0;z-index:9}
    .brand{font-weight:700;color:#14532d;font-size:20px}
    .page{max-width:980px;margin:auto;padding:20px}
    h1{color:#14532d;text-align:center}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:16px 0}
    .card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 4px 14px rgba(0,0,0,.06)}
    .card h3{margin:0 0 8px 0;font-size:16px;color:#064e3b}
    .big{font-size:28px;font-weight:800;color:#111}
    .muted{color:#64748b;font-size:13px}
    .chart-wrap{background:#fff;border-radius:16px;padding:16px;box-shadow:0 4px 20px rgba(0,0,0,.05)}
    .btn{background:#16a34a;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer}
    .btn.secondary{background:#0ea5e9}
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand">منصة إثراء الثقافة السعودية</div>
    <div class="header-actions">
      <button class="btn secondary" onclick="history.back()">رجوع</button>
      <button class="btn" onclick="goToHome()">الرئيسية</button>
    </div>
  </header>

  <div class="page">
    <h1>إحصائياتي</h1>

    <div id="flash" class="muted"></div>

    <section class="cards">
      <div class="card">
        <h3>عدد الجلسات</h3>
        <div class="big" id="sessCount">0</div>
        <div class="muted" id="sessLast">—</div>
      </div>
      <div class="card">
        <h3>إجمالي الأسئلة التي أجبتها</h3>
        <div class="big" id="answeredCount">0</div>
        <div class="muted">تشمل المفتوحة وغير المصحَّحة</div>
      </div>
      <div class="card">
        <h3>أسئلة قابلة للتصحيح (MCQ/TF/…)</h3>
        <div class="big" id="gradedCount">0</div>
        <div class="muted" id="correctCount">صحيحة: 0</div>
      </div>
      <div class="card">
        <h3>الدقة العامة</h3>
        <div class="big" id="accuracy">0%</div>
        <div class="muted">= الصحيحة / القابلة للتصحيح</div>
      </div>
    </section>

    <div class="chart-wrap">
      <canvas id="chartByType" height="120"></canvas>
    </div>

    <div class="chart-wrap" style="margin-top:16px">
      <canvas id="chartByCategory" height="140"></canvas>
    </div>
  </div>

  <script>
    function goToHome(){ location.href = "select-role.html"; }

    function readUser(){
      try{
        const u = JSON.parse(localStorage.getItem('currentUser') || '{}');
        return u.username || u.email || 'guest';
      }catch{ return 'guest'; }
    }
    function readStore(username){
      const key = `thq_results_v1:${username}`;
      try{ return JSON.parse(localStorage.getItem(key) || '{"sessions":[]}'); }catch{ return {sessions:[]}; }
    }
    function fmtDate(ts){
      const d = new Date(ts);
      return d.toLocaleString('ar-SA', {hour12:false});
    }

    function loadStats(){
      const user = readUser();
      const store = readStore(user);
      const sessions = store.sessions || [];

      document.getElementById('sessCount').textContent = sessions.length;
      document.getElementById('sessLast').textContent  = sessions.length ? ('آخر جلسة: ' + fmtDate(sessions[sessions.length-1].ts)) : 'لا يوجد بعد';

      let answered = 0, graded = 0, correct = 0;
      const byType = {};
      const byCat  = {};

      sessions.forEach(s => {
        answered += (s.answers || []).length;
        graded   += +s.gradedTotal || 0;
        correct  += +s.correct || 0;

        const t = s.type || 'OTHER';
        byType[t] = byType[t] || {graded:0,correct:0};
        byType[t].graded += (+s.gradedTotal || 0);
        byType[t].correct+= (+s.correct || 0);

        const c = s.category || '—';
        byCat[c] = byCat[c] || {graded:0,correct:0};
        byCat[c].graded += (+s.gradedTotal || 0);
        byCat[c].correct+= (+s.correct || 0);
      });

      document.getElementById('answeredCount').textContent = answered;
      document.getElementById('gradedCount').textContent   = graded;
      document.getElementById('correctCount').textContent  = 'صحيحة: ' + correct;

      const acc = graded>0 ? Math.round((correct/graded)*100) : 0;
      document.getElementById('accuracy').textContent = acc + '%';

      // Charts
      const ctx1 = document.getElementById('chartByType').getContext('2d');
      const tLabels = Object.keys(byType);
      const tGraded = tLabels.map(k => byType[k].graded);
      const tCorrect= tLabels.map(k => byType[k].correct);
      new Chart(ctx1, {
        type:'bar',
        data:{
          labels:tLabels,
          datasets:[
            {label:'قابلة للتصحيح', data:tGraded, borderWidth:1},
            {label:'إجابات صحيحة', data:tCorrect, borderWidth:1}
          ]
        },
        options:{ responsive:true, scales:{y:{beginAtZero:true}} }
      });

      const ctx2 = document.getElementById('chartByCategory').getContext('2d');
      const cLabels = Object.keys(byCat);
      const cAcc = cLabels.map(k => {
        const g = byCat[k].graded || 0; const c = byCat[k].correct || 0;
        return g>0 ? Math.round((c/g)*100) : 0;
      });
      new Chart(ctx2, {
        type:'bar',
        data:{ labels:cLabels, datasets:[{label:'الدقة ٪ حسب القسم', data:cAcc, borderWidth:1}]},
        options:{ responsive:true, scales:{y:{beginAtZero:true, max:100}} }
      });

      // Flash
      if (new URLSearchParams(location.search).get('flash') === 'saved'){
        const f = document.getElementById('flash');
        f.textContent = '✅ تم حفظ نتائج جلستك بنجاح';
        setTimeout(()=> f.textContent='', 4000);
      }
    }

    document.addEventListener('DOMContentLoaded', loadStats);
  </script>
</body>
</html>
