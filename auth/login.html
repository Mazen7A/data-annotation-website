<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>تسجيل الدخول</title>
  <link rel="stylesheet" href="../assets/css/style.css"/>
</head>
<body>
  <header class="site-header">
    <div class="brand">منصّة إثراء الثقافة السعودية</div>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <h1>تسجيل الدخول</h1>
      <div id="msg" class="msg" aria-live="polite"></div>

      <div class="form">
        <div class="form-group">
          <label for="email">البريد الإلكتروني</label>
          <input id="email" type="email" placeholder="example@mail.com" autocomplete="email" required/>
        </div>

        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <input id="password" type="password" placeholder="********" autocomplete="current-password" required/>
        </div>

        <div class="auth-actions">
          <div class="left">
            <a href="./forgot.html">هل نسيت كلمة المرور؟</a>
          </div>
          <div class="right">
            <button id="loginBtn" class="auth-submit" type="button">دخول</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function(){
      'use strict';
      const $ = id => document.getElementById(id);
      const msgEl = $('msg'), emailEl = $('email'), pwEl = $('password'), loginBtn = $('loginBtn');

      function setMsg(t, type){ msgEl.textContent = t||''; msgEl.className = 'msg' + (type?(' '+type):''); }

      // مثال: إنشاء مستخدم تجريبي إذا ما فيه بيانات (تقدر تشيله)
      if (!localStorage.getItem('users')) {
        localStorage.setItem('users', JSON.stringify([
          { email: 'example@mail.com', password: 'Aa123456' }
        ]));
      }

      loginBtn.addEventListener('click', () => {
        const email = (emailEl.value||'').trim().toLowerCase();
        const pw = pwEl.value||'';
        setMsg('', '');
        if (!email || !pw){ setMsg('أدخل البريد وكلمة المرور.', 'error'); return; }

        const users = JSON.parse(localStorage.getItem('users')||'[]');
        const user = users.find(u => (u && (u.email||'').toLowerCase() === email && (u.password||'') === pw));

        if (!user){ setMsg('بيانات الدخول غير صحيحة.', 'error'); return; }

        // نجاح
        localStorage.setItem('currentUser', JSON.stringify({ email: user.email }));
        setMsg('تم تسجيل الدخول بنجاح!', 'success');
        setTimeout(()=>{ window.location.href = '../home/project-list.html'; }, 1000);
      });
    })();
  </script>
</body>
</html>
