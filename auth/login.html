<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>تسجيل الدخول</title>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <script src="../assets/js/app.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-left">
      <img src="../assets/images/thaqafatna-circle.svg" alt="ثقافتنا" class="logo">
    </div>
    <div class="brand">منصة إثراء الثقافة السعودية</div>
    <nav class="actions"></nav>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <header class="auth-header">
        <h1 class="auth-title">تسجيل الدخول</h1>
        <p class="auth-subtitle">مرحبًا بك مجددًا 👋</p>
      </header>

      <div id="loginMsg" class="msg"></div>

      <form id="loginForm" class="form">
        <div class="form-group">
          <label>اسم المستخدم أو البريد الإلكتروني</label>
          <input type="text" id="loginId" placeholder="مثال: mazen أو mazen@example.com" required />
        </div>
        <div class="form-group input-with-icon">
          <label>كلمة المرور</label>
          <input type="password" id="loginPw" placeholder="أدخل كلمة المرور" required />
        </div>

        <div class="auth-actions">
          <div class="left">
            <a href="./register.html">إنشاء حساب</a>
            <a href="./forgot.html">نسيت كلمة المرور؟</a>
          </div>
          <div class="right">
            <button type="submit" class="auth-submit">تسجيل الدخول</button>
          </div>
        </div>
      </form>
    </section>
  </main>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const id = loginId.value.trim();
      const pw = loginPw.value;
      const msg = loginMsg; msg.textContent = ""; msg.className = "msg";
      const users = JSON.parse(localStorage.getItem("users") || "[]");
      const found = users.find(u => (u.username === id || u.email === id));
      if (!found) { msg.textContent = "اسم المستخدم أو البريد الإلكتروني غير صحيح."; msg.className="msg error"; return; }
      if (found.password !== pw) { msg.textContent = "كلمة المرور غير صحيحة."; msg.className="msg error"; return; }
      setCurrentUser({username: found.username, email: found.email});
      window.location.href = "../home/select-role.html";
    });
  </script>
</body>
</html>
