<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>استعادة كلمة المرور</title>
  <link rel="stylesheet" href="../assets/css/style.css"/>
</head>
<body>
  <header class="site-header">
    <div class="brand">منصة إثراء الثقافة السعودية</div>
    <nav class="actions">
      <button class="btn" onclick="history.back()">رجوع</button>
    </nav>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <h1>استعادة كلمة المرور</h1>
      <p>أدخل بريدك الإلكتروني لإرسال رمز التحقق</p>

      <div id="msg" class="msg"></div>

      <input id="email" type="email" placeholder="example@mail.com"/><br><br>
      <button id="send">إرسال الرمز</button>

      <div id="codeBox" style="display:none; margin-top:10px;">
        <input id="code" maxlength="6" placeholder="أدخل الرمز"/>
        <button id="check">تحقق</button>
      </div>
    </section>
  </main>

  <script>
    const msg = document.getElementById('msg');
    const emailInput = document.getElementById('email');
    const codeBox = document.getElementById('codeBox');
    const codeInput = document.getElementById('code');
    let sentCode = "";

    document.getElementById('send').onclick = function() {
      const email = emailInput.value.trim();
      if (!email) { msg.textContent = "يرجى إدخال البريد."; msg.className="msg error"; return; }

      // مثال بسيط: افترض المستخدم موجود
      sentCode = Math.floor(100000 + Math.random() * 900000).toString();
      sessionStorage.setItem("resetCode", sentCode);
      sessionStorage.setItem("resetEmail", email);

      msg.textContent = "تم إرسال الرمز: " + sentCode + " (تجريبي)";
      msg.className="msg success";
      codeBox.style.display = "block";
    };

    document.getElementById('check').onclick = function() {
      const entered = codeInput.value.trim();
      const real = sessionStorage.getItem("resetCode");
      if (entered === real && entered !== "") {
        msg.textContent = "تم التحقق بنجاح! سيتم نقلك لتعيين كلمة المرور...";
        msg.className = "msg success";
        setTimeout(() => window.location.href = "reset.html", 1500);
      } else {
        msg.textContent = "الرمز غير صحيح.";
        msg.className = "msg error";
      }
    };
  </script>
</body>
</html>
