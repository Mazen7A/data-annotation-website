<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>استعادة كلمة المرور</title>
  <link rel="stylesheet" href="../assets/css/style.css"/>
</head>
<body>
  <header class="site-header">
    <div class="header-left">
      <img src="../assets/images/thaqafatna-circle.svg" alt="ثقافتنا" class="logo">
    </div>
    <div class="brand">منصة إثراء الثقافة السعودية</div>
    <nav class="actions">
      <button class="btn-back" onclick="history.back()">رجوع</button>
    </nav>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <header class="auth-header">
        <h1 class="auth-title">استعادة كلمة المرور</h1>
        <p class="auth-subtitle">أدخل بريدك لتصلك شفرة تحقق</p>
      </header>

      <div id="resetMsg" class="msg"></div>

      <div class="form">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input id="fpEmail" type="email" placeholder="example@mail.com"/>
        </div>
        <div class="auth-actions">
          <div class="left"><a href="./login.html">عودة لتسجيل الدخول</a></div>
          <div class="right"><button id="sendCodeBtn" class="auth-submit">إرسال رمز</button></div>
        </div>

        <div id="code-section" style="display:none; margin-top:10px;">
          <div class="form-row two-col">
            <div class="form-group">
              <label>رمز التحقق</label>
              <input id="verification-code" maxlength="6" inputmode="numeric" />
            </div>
            <div class="form-group">
              <label>الوقت والمحاولات</label>
              <div>
                <span id="timer"></span>
                <span id="attempts"></span>
              </div>
            </div>
          </div>
          <div class="auth-actions">
            <div class="right"><button id="checkCodeBtn" class="auth-submit">تحقق من الرمز</button></div>
          </div>

          <div id="set-password-section" style="display:none; margin-top:10px;">
            <div class="form-row two-col">
              <div class="form-group">
                <label>كلمة المرور الجديدة</label>
                <input id="new-password" type="password" minlength="8" autocomplete="new-password" />
                <small class="field-hint">8+ أحرف وتضم رقمًا وحرفًا كبيرًا وصغيرًا</small>
              </div>
              <div class="form-group">
                <label>تأكيد كلمة المرور الجديدة</label>
                <input id="confirm-password" type="password" minlength="8" autocomplete="new-password" />
              </div>
            </div>
            <div class="auth-actions">
              <div class="right"><button id="saveNewPwBtn" class="auth-submit">حفظ كلمة المرور</button></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    // حالة داخلية
    let generatedCode = "";
    let codeValidUntil = 0;
    let timerInterval = null;
    let attemptsLeft = 5;
    let fpUser = null;

    // مساعدين سريعين
    const $ = (id) => document.getElementById(id);
    const msgBox = () => $('resetMsg');

    function stopTimer(){
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    function startTimer() {
      const timerEl = $('timer');
      stopTimer();
      function update() {
        const remain = Math.max(0, Math.floor((codeValidUntil - Date.now()) / 1000));
        const mm = Math.floor(remain / 60);
        const ss = ('0' + (remain % 60)).slice(-2);
        timerEl.textContent = `الوقت المتبقي: ${mm}:${ss}`;
        if (remain <= 0) {
          stopTimer();
          timerEl.textContent = "انتهت صلاحية الرمز! اطلب رمز جديد.";
        }
      }
      update();
      timerInterval = setInterval(update, 1000);
    }

    function showMsg(text, type) {
      const box = msgBox();
      box.textContent = text;
      box.className = "msg " + (type || "");
    }

    // إرسال الرمز
    $('sendCodeBtn').onclick = function() {
      const email = $('fpEmail').value.trim();
      showMsg("", "");
      if (!email) { showMsg("يرجى إدخال البريد.", "error"); return; }

      let users = [];
      try { users = JSON.parse(localStorage.getItem("users") || "[]"); } catch {}
      fpUser = users.find(u => u.email === email);

      if (!fpUser) {
        showMsg("البريد غير موجود.", "error");
        return;
      }

      generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
      codeValidUntil = Date.now() + (7 * 60 * 1000); // 7 دقائق
      attemptsLeft = 5;

      // تفعيل واجهة التحقق
      $('code-section').style.display = "block";
      $('set-password-section').style.display = "none";
      $('verification-code').value = "";
      $('attempts').textContent = `المتبقي: ${attemptsLeft}`;

      // للعرض في وضع التجربة
      showMsg(`تم إرسال الرمز: ${generatedCode} (للتجربة)`, "success");
      startTimer();
    };

    // التحقق من الرمز
    $('checkCodeBtn').onclick = function() {
      const code = $('verification-code').value.trim();
      if (!code) { showMsg("أدخل الرمز للتحقق.", "error"); return; }

      if (Date.now() > codeValidUntil) {
        showMsg("انتهت صلاحية الرمز! اطلب جديدًا.", "error");
        return;
      }

      if (code !== generatedCode) {
        attemptsLeft--;
        $('attempts').textContent = `المتبقي: ${attemptsLeft}`;
        showMsg("الرمز غير صحيح.", "error");
        if (attemptsLeft <= 0) {
          showMsg("استنفدت المحاولات! اطلب رمز جديد.", "error");
          $('code-section').style.display = "none";
          stopTimer();
        }
        return;
      }

      $('set-password-section').style.display = "block";
      showMsg("تم التحقق. أدخل كلمة مرور جديدة.", "success");
    };

    // حفظ كلمة المرور الجديدة
    $('saveNewPwBtn').onclick = function() {
      const newPw = $('new-password').value;
      const confirmPw = $('confirm-password').value;

      const strong = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;
      if (!strong.test(newPw)) { showMsg("كلمة المرور ضعيفة. اتبع المتطلبات أعلاه.", "error"); return; }
      if (newPw !== confirmPw) { showMsg("كلمتا المرور غير متطابقتين.", "error"); return; }

      let users = [];
      try { users = JSON.parse(localStorage.getItem("users") || "[]"); } catch {}

      if (!fpUser) { showMsg("الجلسة انتهت، أرسل رمزًا من جديد.", "error"); return; }

      users = users.map(u => u.email === fpUser.email ? { ...u, password: newPw } : u);
      localStorage.setItem("users", JSON.stringify(users));

      // تنظيف الحالة
      stopTimer();
      $('set-password-section').style.display = "none";
      $('code-section').style.display = "none";
      showMsg("تم تغيير كلمة المرور بنجاح!", "success");
    };
  </script>
</body>
</html>
