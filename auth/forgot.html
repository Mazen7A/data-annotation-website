<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>استعادة كلمة المرور</title>
  <link rel="stylesheet" href="../assets/css/style.css"/>
</head>
<body>
  <header class="site-header">
    <div class="header-left">
      <img src="../assets/images/thaqafatna-circle.svg" alt="ثقافتنا" class="logo">
    </div>
    <div class="brand">منصة إثراء الثقافة السعودية</div>
    <nav class="actions">
      <button class="btn-back" onclick="history.back()">رجوع</button>
    </nav>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <header class="auth-header">
        <h1 class="auth-title">استعادة كلمة المرور</h1>
        <p class="auth-subtitle">أدخل بريدك لتصلك شفرة تحقق</p>
      </header>

      <div id="resetMsg" class="msg"></div>

      <div class="form">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input id="fpEmail" type="email" placeholder="example@mail.com"/>
        </div>
        <div class="auth-actions">
          <div class="left"><a href="./login.html">عودة لتسجيل الدخول</a></div>
          <div class="right"><button id="sendCodeBtn" class="auth-submit">إرسال رمز</button></div>
        </div>

        <div id="code-section" style="display:none;">
          <div class="form-row two-col">
            <div class="form-group">
              <label>رمز التحقق</label>
              <input id="verification-code" maxlength="6" />
            </div>
            <div class="form-group">
              <label>الوقت والمحاولات</label>
              <div><span id="timer"></span> <span id="attempts"></span></div>
            </div>
          </div>
          <div class="auth-actions">
            <div class="right"><button id="checkCodeBtn" class="auth-submit">تحقق من الرمز</button></div>
          </div>

          <div id="set-password-section" style="display:none;">
            <div class="form-row two-col">
              <div class="form-group">
                <label>كلمة المرور الجديدة</label>
                <input id="new-password" type="password" minlength="8" />
              </div>
              <div class="form-group">
                <label>تأكيد كلمة المرور الجديدة</label>
                <input id="confirm-password" type="password" minlength="8" />
              </div>
            </div>
            <div class="auth-actions">
              <div class="right"><button id="saveNewPwBtn" class="auth-submit">حفظ كلمة المرور</button></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    let generatedCode = "", codeValidUntil = 0, timerInterval = null, attemptsLeft = 5, fpUser = null;

    function startTimer() {
      const timer = document.getElementById('timer');
      function update() {
        const remain = Math.max(0, Math.floor((codeValidUntil - Date.now())/1000));
        timer.textContent = `الوقت المتبقي: ${Math.floor(remain/60)}:${('0'+(remain%60)).slice(-2)}`;
        if (remain <= 0) { clearInterval(timerInterval); timer.textContent = "انتهت صلاحية الرمز! اطلب رمز جديد."; }
      }
      update(); timerInterval = setInterval(update, 1000);
    }

    sendCodeBtn.onclick = function() {
      const email = fpEmail.value.trim();
      const msg = resetMsg; msg.textContent = ""; msg.className = "msg";
      if (!email) { msg.textContent = "يرجى إدخال البريد."; msg.className="msg error"; return; }
      const users = JSON.parse(localStorage.getItem("users") || "[]");
      fpUser = users.find(u => u.email === email);
      if (!fpUser) { msg.textContent = "البريد غير موجود."; msg.className="msg error"; return; }
      generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
      codeValidUntil = Date.now() + 7*60*1000; attemptsLeft = 5;
      document.getElementById("code-section").style.display = "block";
      verification-code.value = ""; attempts.textContent = `المتبقي: ${attemptsLeft}`;
      document.getElementById("set-password-section").style.display = "none";
      msg.textContent = `تم إرسال الرمز: ${generatedCode} (للتجربة)`; msg.className="msg success";
      startTimer();
    };

    checkCodeBtn.onclick = function() {
      const code = document.getElementById("verification-code").value.trim();
      const msg = resetMsg;
      if (Date.now() > codeValidUntil) { msg.textContent = "انتهت صلاحية الرمز! اطلب جديدًا."; msg.className="msg error"; return; }
      if (code !== generatedCode) {
        attemptsLeft--; attempts.textContent = `المتبقي: ${attemptsLeft}`;
        msg.textContent = "الرمز غير صحيح."; msg.className="msg error";
        if (attemptsLeft <= 0) { msg.textContent = "استنفدت المحاولات! اطلب رمز جديد."; document.getElementById("code-section").style.display="none"; }
        return;
      }
      document.getElementById("set-password-section").style.display = "block";
      msg.textContent = "تم التحقق. أدخل كلمة مرور جديدة."; msg.className="msg success";
    };

    saveNewPwBtn.onclick = function() {
      const newPw = document.getElementById("new-password").value;
      const confirmPw = document.getElementById("confirm-password").value;
      const msg = resetMsg;
      if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/.test(newPw)) { msg.textContent="كلمة المرور ضعيفة."; msg.className="msg error"; return; }
      if (newPw !== confirmPw) { msg.textContent="كلمتا المرور غير متطابقتين."; msg.className="msg error"; return; }
      let users = JSON.parse(localStorage.getItem("users") || "[]");
      users = users.map(u => u.email === fpUser.email ? {...u, password:newPw} : u);
      localStorage.setItem("users", JSON.stringify(users));
      msg.textContent = "تم تغيير كلمة المرور بنجاح!"; msg.className="msg success";
      document.getElementById("set-password-section").style.display = "none";
      document.getElementById("code-section").style.display = "none";
    };
  </script>
</body>
</html>
